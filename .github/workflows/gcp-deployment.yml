name: Capstone Project Platform GCP Deployment
on:
  push:
    branches:
      - main

jobs:
    deploy:
        runs-on: ubuntu-latest


        env:
          VM_NAME: vm-platform-seed
          ZONE: asia-southeast1-c

        permissions:
          contents: 'read'
          id-token: 'write'


        steps:
          - name: Authenticate to Google Cloud
            uses: google-github-actions/auth@v3
            with:
              workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
              service_account: ${{ secrets.GCP_SA_EMAIL }}
              project_id: ${{ secrets.GCP_PROJECT_ID }}


          - name: Set up gcloud Cloud SDK environment
            uses: google-github-actions/setup-gcloud@v3.0.1

          - name: Start the vm-platform-seed instance
            run: gcloud compute instances start ${{ env.VM_NAME }} --zone=${{ env.ZONE }}

          - name: Connect with the vm-platform-seed instance through SSH
            run: gcloud compute ssh vm-platform-seed --zone=asia-southeast1-c

          - name: Connect with the vm-platform-seed instance through SSH
            run: >
                gcloud compute ssh ${{ env.VM_NAME }} --zone=${{ env.ZONE }} 
                --command "echo 'Connected to vm-platform-seed successfully!'

