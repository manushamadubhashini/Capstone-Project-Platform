name: Capstone Project Platform GCP Deployment
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      VM_NAME: vm-platform-seed
      ZONE: asia-southeast1-c
      USER_NAME: madubhashinimanusha
      IMAGE_NAME: vm-platform-seed-boot-image-2
      REGION: asia-southeast1
      INSTANCE_GROUP: mig-platform
      INSTANCE_TEMPLATE: tmp-vm-platform-seed-v2

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up gcloud Cloud SDK environment
        uses: google-github-actions/setup-gcloud@v3.0.1

      - name: Start the vm-platform-seed instance
        run: gcloud compute instances start ${{ env.VM_NAME }} --zone=${{ env.ZONE }}

      - name: Connect with the vm-platform-seed instance through SSH
        run: |
          gcloud compute ssh ${{ env.USER_NAME }}@${{ env.VM_NAME }} \
            --zone=${{ env.ZONE }} \
            --command "echo 'Connected to vm-platform-seed successfully!' && \
              cd Capstone-Project-Platform/ && \
              git pull --recurse-submodules && \
              source ~/.bashrc && \
              mvn clean package"

      - name: Stop the vm-platform-seed instance
        run: gcloud compute instances stop ${{ env.VM_NAME }} --zone=${{ env.ZONE }}

      - name: Delete the boot disk image
        run: gcloud compute images delete ${{ env.IMAGE_NAME }}
        continue-on-error: true

      - name: Create a new boot disk image with the previous image name
        run: |
          gcloud compute images create ${{ env.IMAGE_NAME }} \
            --source-disk=${{ env.VM_NAME }} \
            --source-disk-zone=${{ env.ZONE }} \
            --storage-location=${{ env.REGION }}

      - name: Delete old startup template if exists
        run: |
          gcloud compute instance-templates delete ${{ env.INSTANCE_TEMPLATE }}-startup \
            --region=${{ env.REGION }} --quiet 2>/dev/null || true

      - name: Create new instance template with startup script
        run: |
          # Get machine type and other config from existing template
          MACHINE_TYPE=$(gcloud compute instance-templates describe ${{ env.INSTANCE_TEMPLATE }} \
            --region=${{ env.REGION }} \
            --format="value(properties.machineType)" 2>/dev/null || \
            gcloud compute instance-templates describe ${{ env.INSTANCE_TEMPLATE }} \
            --format="value(properties.machineType)")

          gcloud compute instance-templates create ${{ env.INSTANCE_TEMPLATE }}-startup \
            --region=${{ env.REGION }} \
            --machine-type=$MACHINE_TYPE \
            --image=${{ env.IMAGE_NAME }} \
            --image-project=${{ secrets.GCP_PROJECT_ID }} \
            --metadata startup-script='#!/bin/bash
          sudo sed -i "/config.platform/d" /etc/hosts
          sudo sed -i "/discovery.platform/d" /etc/hosts
          echo "127.0.0.1 config.platform discovery.platform" | sudo tee -a /etc/hosts
          export SDKMAN_DIR="/home/madubhashinimanusha/.sdkman"
          [[ -s "$SDKMAN_DIR/bin/sdkman-init.sh" ]] && source "$SDKMAN_DIR/bin/sdkman-init.sh"
          cd /home/madubhashinimanusha/Capstone-Project-Platform/
          nohup java -jar ./Service-Registry/target/Service-Registry-1.0.0.jar > /home/madubhashinimanusha/registry.log 2>&1 &
          sleep 45
          nohup java -jar ./Config-Server/target/Config-Server-1.0.0.jar > /home/madubhashinimanusha/config.log 2>&1 &
          sleep 45
          nohup java -jar ./Api-Gateway/target/Api-Gateway-1.0.0.jar > /home/madubhashinimanusha/gateway.log 2>&1 &'

      - name: Update the instance group with the new image
        run: |
          gcloud compute instance-groups managed rolling-action start-update ${{ env.INSTANCE_GROUP }} \
            --region=${{ env.REGION }} \
            --type=proactive \
            --max-unavailable=3 \
            --minimal-action=replace \
            --replacement-method=recreate \
            --max-surge=0 \
            --version=template=projects/${{ secrets.GCP_PROJECT_ID }}/regions/${{ env.REGION }}/instanceTemplates/${{ env.INSTANCE_TEMPLATE }}-startup,name=latest